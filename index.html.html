            ]},
            { pos: '外来語', kanji: '', kana: 'ニュース', en: 'news', sentences: [
                { sentence: '今朝、（ [_____] ）で事故を知った。', answer: 'ニュース' }
            ]},
            { pos: '外来語', kanji: '', kana: 'アニメ', en: 'anime', sentences: [
                { sentence: '私は毎週新しい（ [_____] ）を見る。', answer: 'アニメ' }
            ]},
            { pos: '外来語', kanji: '', kana: 'デザイン', en: 'design', sentences: [
                { sentence: 'この車の（ [_____] ）が好きだ。', answer: 'デザイン' }
            ]}
        ];

        // グローバル状態
        let currentQuestions = [];
        let userAnswers = new Array(10).fill('');
        let currentIndex = 0;
        let quizFinished = false;
        const starredSet = new Set();

        const progressTrack = document.getElementById('progressTrack');
        const ruleBanner = document.getElementById('ruleBanner');
        const sentenceDisplay = document.getElementById('sentenceDisplay');
        const answerInput = document.getElementById('answerInput');
        const nextOrCheckBtn = document.getElementById('nextOrCheckBtn');
        const prevQuestionBtn = document.getElementById('prevQuestionBtn');
        const quizArea = document.getElementById('quizArea');
        const resultsArea = document.getElementById('resultsArea');
        const vocabListArea = document.getElementById('vocabListArea');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const resultList = document.getElementById('resultList');
        const restartBtn = document.getElementById('restartQuizBtn');
        const showVocabListBtn = document.getElementById('showVocabListBtn');
        const quickVocabBtn = document.getElementById('quickVocabBtn');
        const backToTestBtn = document.getElementById('backToTestBtn');
        const hintButton = document.getElementById('hintButton');
        const hintDisplay = document.getElementById('hintDisplay');

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generateQuiz() {
            const shuffled = shuffle([...VOCAB_DB]);
            const selected = shuffled.slice(0, 10);
            return shuffle(selected.map(v => {
                const rand = Math.floor(Math.random() * v.sentences.length);
                return { sentence: v.sentences[rand].sentence, answer: v.sentences[rand].answer, pos: v.pos };
            }));
        }

        function initQuiz() {
            currentQuestions = generateQuiz();
            userAnswers = new Array(10).fill('');
            currentIndex = 0;
            quizFinished = false;
            quizArea.classList.remove('hidden');
            resultsArea.classList.add('hidden');
            vocabListArea.classList.add('hidden');
            hintDisplay.classList.add('hidden');
            // 表示横幅和进度条
            ruleBanner.classList.remove('hidden');
            progressTrack.classList.remove('hidden');
            quickVocabBtn.classList.remove('hidden');
            renderProgressIndicators();
            renderQuestionByIndex(currentIndex);
            updateButtons();
            answerInput.focus();
        }

        function renderProgressIndicators() {
            progressTrack.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const ind = document.createElement('div');
                ind.className = 'q-indicator';
                if (i === currentIndex && !quizFinished) ind.classList.add('active');
                if (userAnswers[i].trim() !== '') ind.classList.add('answered');
                const span = document.createElement('span');
                span.textContent = i + 1;
                ind.appendChild(span);
                ind.addEventListener('click', () => {
                    if (quizFinished) return;
                    saveCurrentAnswer();
                    currentIndex = i;
                    renderQuestionByIndex(currentIndex);
                    updateButtons();
                    renderProgressIndicators();
                    hintDisplay.classList.add('hidden');
                    answerInput.focus();
                });
                progressTrack.appendChild(ind);
            }
        }

        function saveCurrentAnswer() {
            if (!quizFinished && currentIndex >= 0 && currentIndex < 10) {
                userAnswers[currentIndex] = answerInput.value.trim();
            }
        }

        function renderQuestionByIndex(index) {
            const q = currentQuestions[index];
            sentenceDisplay.innerHTML = q.sentence.replace(/\[_____\]/g, '<span class="blank-highlight">＿＿＿</span>');
            answerInput.value = userAnswers[index] || '';
        }

        function updateButtons() {
            nextOrCheckBtn.textContent = currentIndex === 9 ? 'チェック' : '次の質問';
            prevQuestionBtn.classList.toggle('hidden', currentIndex === 0 || quizFinished);
        }

        function showHint() {
            if (quizFinished) return;
            hintDisplay.textContent = `🔍 詞性： ${currentQuestions[currentIndex].pos}`;
            hintDisplay.classList.remove('hidden');
        }

        function goToPrev() {
            if (quizFinished || currentIndex <= 0) return;
            saveCurrentAnswer();
            currentIndex--;
            renderQuestionByIndex(currentIndex);
            updateButtons();
            renderProgressIndicators();
            hintDisplay.classList.add('hidden');
            answerInput.focus();
        }

        function handleNextOrCheck() {
            if (quizFinished) return;
            saveCurrentAnswer();
            if (currentIndex === 9) {
                finishAndShowResults();
                return;
            }
            currentIndex++;
            renderQuestionByIndex(currentIndex);
            updateButtons();
            renderProgressIndicators();
            hintDisplay.classList.add('hidden');
            answerInput.focus();
        }

        function finishAndShowResults() {
            quizFinished = true;
            let correct = 0;
            const items = [];
            currentQuestions.forEach((q, i) => {
                const ans = userAnswers[i] || '';
                const ok = ans === q.answer;
                if (ok) correct++;
                const icon = ok ? '✅' : '❌';
                const cls = ok ? 'correct-mark' : 'wrong-mark';
                const disp = q.sentence.replace(/\[_____\]/g, '<span style="background:#1e3a4d; padding:2px 10px; border-radius:30px;">＿＿＿</span>');
                const extra = !ok ? `<span class="correct-answer-show"> (正解: ${q.answer})</span>` : '';
                items.push(`<div class="result-item"><div class="result-status ${cls}">${icon}</div><div class="result-sentence">${disp}<div>あなたの答え: <strong>${ans||'（未入力）'}</strong> ${extra}</div></div></div>`);
            });
            scoreDisplay.textContent = `10問中 ${correct} 正解`;
            resultList.innerHTML = items.join('');
            quizArea.classList.add('hidden');
            resultsArea.classList.remove('hidden');
            vocabListArea.classList.add('hidden');
            // 结果页显示横幅和进度条（但结果页不需要进度条，我们隐藏进度条，保留横幅？ 按用户要求，仅词汇表页面隐藏，测试页/结果页正常显示）
            ruleBanner.classList.remove('hidden');
            progressTrack.classList.remove('hidden');
            quickVocabBtn.classList.remove('hidden');
            renderProgressIndicators();
        }

        function buildVocabList() {
            const categories = { '動詞':[], '名詞':[], 'い形容詞':[], 'な形容詞':[], '副詞':[], 'その他':[], '外来語':[] };
            const seen = new Set();
            VOCAB_DB.forEach(v => {
                if (seen.has(v.kana)) return;
                seen.add(v.kana);
                if (categories[v.pos]) categories[v.pos].push(v);
                else categories['その他'].push(v);
            });
            let html = '';
            for (let cat in categories) {
                if (!categories[cat].length) continue;
                html += `<div class="vocab-category"><h3>📌 ${cat}</h3><table class="vocab-table"><tr><th></th><th>ひらがな/カタカナ</th><th>漢字</th><th>英語</th></tr>`;
                categories[cat].forEach(v => {
                    const key = v.kana;
                    const starred = starredSet.has(key);
                    const starChar = starred ? '★' : '☆';
                    const starClass = starred ? 'star-filled' : 'star-empty';
                    html += `<tr><td class="star-cell ${starClass}" data-kana="${key}">${starChar}</td><td>${v.kana}</td><td>${v.kanji || ''}</td><td>${v.en}</td></tr>`;
                });
                html += `</table></div>`;
            }
            document.getElementById('vocabContent').innerHTML = html;
            document.querySelectorAll('.star-cell').forEach(cell => {
                cell.addEventListener('click', function() {
                    const kana = this.dataset.kana;
                    if (starredSet.has(kana)) {
                        starredSet.delete(kana);
                        this.textContent = '☆';
                        this.classList.remove('star-filled');
                        this.classList.add('star-empty');
                    } else {
                        starredSet.add(kana);
                        this.textContent = '★';
                        this.classList.add('star-filled');
                        this.classList.remove('star-empty');
                    }
                });
            });
        }

        function showVocabPanel() {
            buildVocabList();
            quizArea.classList.add('hidden');
            resultsArea.classList.add('hidden');
            vocabListArea.classList.remove('hidden');
            // 隐藏横幅、进度条、快速按钮
            ruleBanner.classList.add('hidden');
            progressTrack.classList.add('hidden');
            quickVocabBtn.classList.add('hidden');
        }

        function hideVocabAndReturn() {
            vocabListArea.classList.add('hidden');
            // 恢复显示
            ruleBanner.classList.remove('hidden');
            progressTrack.classList.remove('hidden');
            quickVocabBtn.classList.remove('hidden');
            if (quizFinished) {
                resultsArea.classList.remove('hidden');
            } else {
                quizArea.classList.remove('hidden');
                answerInput.focus();
            }
        }

        answerInput.addEventListener('input', function() {
            if (quizFinished) return;
            userAnswers[currentIndex] = this.value.trim();
            renderProgressIndicators();
        });

        nextOrCheckBtn.addEventListener('click', handleNextOrCheck);
        prevQuestionBtn.addEventListener('click', goToPrev);
        hintButton.addEventListener('click', showHint);
        restartBtn.addEventListener('click', initQuiz);
        showVocabListBtn.addEventListener('click', showVocabPanel);
        quickVocabBtn.addEventListener('click', showVocabPanel);
        backToTestBtn.addEventListener('click', hideVocabAndReturn);
        answerInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !quizFinished) { e.preventDefault(); handleNextOrCheck(); }});

        initQuiz();
        window.addEventListener('load', ()=> answerInput.focus());
    })();
</script>
</body>
</html>
